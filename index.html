<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>化学物质转化关系学习平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- 头部导航 -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">⚗️</div>
                <span>化学转化学习</span>
            </div>
            <nav class="nav-tabs">
                <button class="nav-tab active" data-tab="diagram">转化图谱</button>
                <button class="nav-tab" data-tab="knowledge">知识详解</button>
                <button class="nav-tab" data-tab="practice">练习测试</button>
                <button class="nav-tab" data-tab="organic">有机反应</button>
            </nav>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </header>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">选择元素</div>
            <div class="element-grid">
                <div class="element-card fe active" data-element="fe">
                    <span class="symbol">Fe</span>
                    <span class="name">铁</span>
                </div>
                <div class="element-card s" data-element="s">
                    <span class="symbol">S</span>
                    <span class="name">硫</span>
                </div>
                <div class="element-card na" data-element="na">
                    <span class="symbol">Na</span>
                    <span class="name">钠</span>
                </div>
                <div class="element-card n" data-element="n">
                    <span class="symbol">N</span>
                    <span class="name">氮</span>
                </div>
                <div class="element-card cl" data-element="cl">
                    <span class="symbol">Cl</span>
                    <span class="name">氯</span>
                </div>
                <div class="element-card si" data-element="si">
                    <span class="symbol">Si</span>
                    <span class="name">硅</span>
                </div>
                <div class="element-card organic" data-element="organic">
                    <span class="symbol">🧪</span>
                    <span class="name">有机反应</span>
                </div>
            </div>
        </aside>

        <!-- 内容区域 -->
        <main class="content-area">
            <!-- 转化图谱页面 -->
            <section class="section-page active" id="diagramSection">
                <div class="diagram-container">
                    <div class="diagram-header">
                        <h2 class="diagram-title" id="diagramTitle">Fe - 铁元素转化关系</h2>
                        <div class="diagram-controls">
                            <button class="diagram-btn" id="resetViewBtn">重置视图</button>
                            <button class="diagram-btn" id="shortcutsBtn">⌨️ 快捷键</button>
                        </div>
                    </div>
                    
                    <!-- 左侧动画区 -->
                    <div class="diagram-left">
                        <div class="animation-stages" id="animationStages">
                            <div class="stage" id="stage1">1. 物质加入</div>
                            <div class="stage" id="stage2">2. 达到条件</div>
                            <div class="stage" id="stage3">3. 现象</div>
                            <div class="stage" id="stage4">4. 结果</div>
                        </div>
                        <div class="animation-box" id="animationBox">
                            <div class="condition-display" id="conditionDisplay"></div>
                            <div class="beaker-container">
                                <div class="beaker" id="beaker">
                                    <div class="beaker-inner" id="beakerInner"></div>
                                </div>
                                <div class="flame" id="flame"></div>
                            </div>
                            <div class="phenomenon-display" id="phenomenonDisplay"></div>
                        </div>
                        <div class="result-display" id="resultDisplay">
                            <span class="chem-formula" id="resultFormula"></span>
                        </div>
                    </div>
                    
                    <!-- 右侧环形图谱 -->
                    <div class="diagram-right">
                        <div class="diagram-canvas" id="diagramCanvas">
                            <svg class="svg-arrows" id="svgArrows">
                                <defs>
                                    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                                        <polygon points="0 0, 10 3.5, 0 7" fill="#2c5282"/>
                                    </marker>
                                </defs>
                            </svg>
                        </div>
                        <div class="zoom-controls">
                            <button class="zoom-btn" id="zoomInBtn">+</button>
                            <button class="zoom-btn" id="zoomOutBtn">−</button>
                        </div>
                    </div>
                </div>
                
                <!-- 知识面板 -->
                <div class="knowledge-panel">
                    <h3 class="knowledge-title">物质性质与反应</h3>
                    <div id="knowledgeContent"></div>
                </div>
            </section>

            <!-- 知识详解页面 -->
            <section class="section-page" id="knowledgeSection">
                <div class="knowledge-detail" id="knowledgeDetail"></div>
            </section>

            <!-- 练习测试页面 -->
            <section class="section-page" id="practiceSection">
                <div class="question-card">
                    <div class="practice-header">
                        <span class="question-type" id="questionType">选择题</span>
                        <div class="practice-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill" style="width:0%"></div>
                            </div>
                            <span class="progress-text" id="progressText">0/10</span>
                        </div>
                    </div>
                    <div class="question-text" id="questionText"></div>
                    <ul class="options-list" id="optionsContainer"></ul>
                    <!-- 下标快捷输入工具栏 -->
                    <div class="subscript-toolbar" id="subscriptToolbar" style="display:none">
                        <span class="toolbar-label">下标：</span>
                        <button class="subscript-btn" data-char="₀">₀</button>
                        <button class="subscript-btn" data-char="₁">₁</button>
                        <button class="subscript-btn" data-char="₂">₂</button>
                        <button class="subscript-btn" data-char="₃">₃</button>
                        <button class="subscript-btn" data-char="₄">₄</button>
                        <button class="subscript-btn" data-char="₅">₅</button>
                        <button class="subscript-btn" data-char="₆">₆</button>
                        <button class="subscript-btn" data-char="₇">₇</button>
                        <button class="subscript-btn" data-char="₈">₈</button>
                        <button class="subscript-btn" data-char="₉">₉</button>
                        <span class="toolbar-sep"></span>
                        <span class="toolbar-label">符号：</span>
                        <button class="subscript-btn" data-char="↑">↑</button>
                        <button class="subscript-btn" data-char="↓">↓</button>
                        <button class="subscript-btn" data-char="→">→</button>
                    </div>
                    <button class="submit-btn" id="submitBtn">提交答案</button>
                    <div class="answer-section" id="answerSection">
                        <div class="answer-status" id="answerStatus"></div>
                        <div class="analysis-box" id="analysisBox"></div>
                    </div>
                </div>
                <div style="text-align:center;margin-top:20px">
                    <button class="submit-btn" id="nextQuestionBtn" style="display:none">下一题</button>
                </div>
            </section>

            <!-- 有机反应页面 -->
            <section class="section-page" id="organicSection">
                <div id="organicContent"></div>
            </section>
        </main>
    </div>

    <!-- 模态框 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">物质详情</h3>
                <button class="modal-close" id="modalClose">×</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- 快捷键提示 -->
    <div class="shortcuts-hint" id="shortcutsHint">
        <h4>⌨️ 快捷键</h4>
        <div class="shortcut-item"><span>切换元素</span><span class="shortcut-key">1-6</span></div>
        <div class="shortcut-item"><span>重置视图</span><span class="shortcut-key">R</span></div>
        <div class="shortcut-item"><span>关闭弹窗</span><span class="shortcut-key">Esc</span></div>
    </div>

    <!-- 移动端底部导航 -->
    <nav class="mobile-nav">
        <button class="mobile-nav-btn active" data-tab="diagram">
            <span class="icon">📊</span>
            <span>图谱</span>
        </button>
        <button class="mobile-nav-btn" data-tab="knowledge">
            <span class="icon">📚</span>
            <span>知识</span>
        </button>
        <button class="mobile-nav-btn" data-tab="practice">
            <span class="icon">✏️</span>
            <span>练习</span>
        </button>
        <button class="mobile-nav-btn" data-tab="organic">
            <span class="icon">🧪</span>
            <span>有机</span>
        </button>
    </nav>

    <!-- 页脚 -->
    <footer class="footer">
        <p>化学物质转化关系学习平台 | 学习化学，享受探索的乐趣</p>
    </footer>

    <!-- 引入脚本 -->
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
